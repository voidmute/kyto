name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish docs/wiki to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          WORK=wiki-push
          rm -rf "$WORK"

          if git clone "$WIKI_URL" "$WORK" 2>/dev/null; then
            echo "Existing wiki cloned"
          else
            echo "Initializing new wiki repository"
            mkdir "$WORK"
            cd "$WORK"
            git init
            git remote add origin "$WIKI_URL"
            cd ..
          fi

          cd "$WORK"
          rsync -av --delete ../docs/wiki/ . --exclude README.md
          git add -A
          if git diff --staged --quiet; then
            echo "Wiki already up to date"
            exit 0
          fi
          git commit -m "Sync wiki from docs/wiki"
          git branch -M master
          git push -u origin master
