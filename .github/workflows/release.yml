name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.5.1-asm)"
        required: true
        default: "v0.5.1-asm"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install NASM
        run: sudo apt-get update && sudo apt-get install -y nasm zip
      - name: Build kura (Kyto compiler)
        run: bash asm/build.sh
      - name: Package Linux release
        run: |
          if [ "${GITHUB_REF}" = "${GITHUB_REF#refs/tags/}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VER="${TAG#v}"
          mkdir -p "dist/kyto-${VER}-linux-x86_64"
          cp bin/kura-asm "dist/kyto-${VER}-linux-x86_64/kura"
          cp LICENSE README.md "dist/kyto-${VER}-linux-x86_64/"
          cd dist && zip -r "../kyto-${VER}-linux-x86_64.zip" "kyto-${VER}-linux-x86_64"
      - uses: actions/upload-artifact@v4
        with:
          name: kyto-linux-zip
          path: kyto-*-linux-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: kura-linux-bin
          path: bin/kura-asm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build kura (Kyto compiler)
        shell: pwsh
        run: ./asm/build.ps1
      - name: Package Windows release
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          } else {
            $tag = '${{ inputs.tag }}'
          }
          $ver = $tag -replace '^v', ''
          $dir = "dist/kyto-$ver-windows-x86_64"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item bin/kura-asm.exe "$dir/kura.exe"
          Copy-Item LICENSE, README.md $dir
          Compress-Archive -Path $dir -DestinationPath "kyto-$ver-windows-x86_64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: kyto-windows-zip
          path: kyto-*-windows-x86_64.zip

  publish-container:
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: kura-linux-bin
          path: bin
      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Prepare Docker context
        run: |
          cp bin/kura-asm package/kura-asm
          chmod +x package/kura-asm
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: docker_meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.tag }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: package
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

  release:
    needs: [build-linux, build-windows, publish-container]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Kyto ${{ steps.meta.outputs.tag }}
          body: |
            ## Kyto ${{ steps.meta.outputs.tag }}

            **Kyto** is the programming language. **kura** is its compiler CLI (`kura compile`, `kura check`, …).

            ### Downloads (GitHub Releases)

            | Platform | Archive |
            |:---------|:--------|
            | Linux x86-64 | `kyto-*-linux-x86_64.zip` — contains `kura` binary |
            | Windows x86-64 | `kyto-*-windows-x86_64.zip` — contains `kura.exe` |

            Extract, then run `kura install` or invoke `kura` directly.

            ### Package (GitHub Container Registry)

            ```bash
            docker pull ghcr.io/voidmute/kyto:${{ steps.meta.outputs.tag }}
            docker run --rm -v "$PWD:/work" -w /work ghcr.io/voidmute/kyto:${{ steps.meta.outputs.tag }} compile
            ```

            See [Packages](https://github.com/voidmute/kyto/pkgs/container/kyto) for all tags.
          generate_release_notes: true
          files: |
            artifacts/kyto-linux-zip/kyto-*-linux-x86_64.zip
            artifacts/kyto-windows-zip/kyto-*-windows-x86_64.zip
